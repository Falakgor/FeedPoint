<html>
<head>
  
  <title>Login - FeedPoint</title>
  
  <link rel="stylesheet" href="style.css">
  
</head>
<body>

<header>
  <div class="logo"><img src="./Feedpoint da logo.png" alt="FeedPoint Logo"></div>
  <h1>FeedPoint</h1>
  
  <nav>
    <a href="index.html">Home</a>
    <a href="login.html">Login</a>
    <a href="account.html">My Account</a>
    <a href="contact.html">Contact</a>
  </nav>
</header>

<section class="contact">
  
  <div class="form">
    
    <h2>Login / Register</h2>
    <form onsubmit="return loginPopup()">

      
      <label for="username">Username</label>
      <input type="text" id="username" name="username" placeholder="Enter Username" required>

      <label for="password">Password</label>
      <input type="password" id="password" name="password" placeholder="Enter Password" required>

      <label for="email">Email / Contact Number</label>
      <input type="text" id="email" name="email" placeholder="Enter Email or Phone" required>

      <label for="address">Address</label>
      <textarea id="address" name="address" placeholder="Enter Address" rows="3" required></textarea>

      <label for="usertype">User Type</label>
      <select id="usertype" name="usertype" required>
        <option value="donor">Donor</option>
        <option value="volunteer">Volunteer</option>
        <option value="ngo">NGO</option>
      </select>

      <button type="submit">Login / Register</button>
    </form>
  </div>
</section>

<footer>
  <p>© 2026 FeedPoint Initiative — Turning Food Waste into Hope</p>
</footer>
<script src="script.js"></script>
</body>
</html>
