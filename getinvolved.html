<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Get Involved - FeedPoint</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo"><img src="./Feedpoint da logo.png" alt="FeedPoint Logo"></div>
  <h1>FeedPoint</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="history.html">History</a>
    <a href="achievements.html">Achievements</a>
    <a href="partners.html">Partners</a>
    <a href="getinvolved.html">Get Involved</a>
    <a href="contact.html">Contact</a>
    <a href="login.html">Login</a>
    <a href="account.html">My Account</a>
  </nav>
</header>

<section class="section">
  <h2 class="section-title">Join Our Initiative</h2>
  <form action="#" method="post">
    <label for="name">Name</label>
    <input type="text" id="name" name="name" placeholder="Your Name" required>

    <label for="email">Email</label>
    <input type="email" id="email" name="email" placeholder="Your Email" required>

    <label for="password">Password</label>
    <input type="password" id="password" name="password" placeholder="Your Password" required>

    <label for="address">Address</label>
    <textarea id="address" name="address" placeholder="Your Address" rows="3" cols="200" required></textarea>
<br><br>
    <label for="role">Select Role</label>
    <select id="role" name="role" required>
      <option value="donor">Donor</option>
      <option value="volunteer">Volunteer</option>
      <option value="ngo">NGO</option>
    </select>

    <button type="submit">Register</button>
  </form>
</section>

<footer>
  <p>© 2026 FeedPoint Initiative — Turning Food Waste into Hope</p>
</footer>

</body>
</html>
