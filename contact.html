<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact - FeedPoint</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <div class="logo"><img src="./Feedpoint da logo.png" alt="FeedPoint Logo"></div>
  <h1>FeedPoint</h1>
  <nav>
    <a href="index.html">Home</a>
    <a href="history.html">History</a>
    <a href="achievements.html">Achievements</a>
    <a href="partners.html">Partners</a>

    <a href="login.html">Login</a>
    <a href="account.html">My Account</a>
  </nav>
</header>

<section class="contact">
  <div class="form">
    <h2>Contact Us</h2>
    <form action="#" method="post">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" placeholder="Your Name" required>

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" placeholder="Your Email" required>

      <label for="message">Message</label>
      <textarea id="message" name="message" placeholder="Message" rows="5" required></textarea>

      <button type="submit">Send</button>
    </form>
  </div>
</section>

<footer>
  <p>© 2026 FeedPoint Initiative — Turning Food Waste into Hope</p>
</footer>

</body>
</html>
